# Drop-in template for /etc/systemd/system/ollama.service.d/keep-alive.conf
#
# Pins Ollama models in memory permanently so cold-start latency doesn't
# blow the memory-recall budget. Without this, OLLAMA_KEEP_ALIVE defaults
# to 5 minutes — the embed model unloads after idle, and the next mnemon
# recall catches a 3-5s cold load that times out the recall path.
#
# The nomic-embed-text model is ~565MB and trivial to keep pinned on most
# hosts. If you have an explicit memory ceiling, set OLLAMA_KEEP_ALIVE=24h
# or similar instead of -1.
#
# Install:
#   sudo mkdir -p /etc/systemd/system/ollama.service.d
#   sudo cp data/systemd/templates/ollama-keep-alive.conf \
#     /etc/systemd/system/ollama.service.d/keep-alive.conf
#   sudo systemctl daemon-reload && sudo systemctl restart ollama
#
# Verify the model is pinned (expires_at in year 2318 = "never" sentinel):
#   curl -s http://127.0.0.1:11434/api/ps | python3 -m json.tool
#
# Optional one-time warmup so the model is loaded before the first recall:
#   curl -s http://127.0.0.1:11434/api/embeddings \
#     -d '{"model":"nomic-embed-text","prompt":"warmup"}' >/dev/null

[Service]
Environment="OLLAMA_KEEP_ALIVE=-1"
