# Decision record for: create-agent-provider
# Initialized by /team-brief on 2026-04-24
# Format: see skills/shared/decision-record-schema.md

constraints:
  - id: C1
    text: "Validation must occur before any persistent state is created (no orphan agent_groups row, agent_destinations rows, or groups/<folder>/ directory)."
    classification: HARD
    source: brief Step 2

  - id: C2
    text: "create_agent remains admin-only — existing gating in agents.ts must not be weakened."
    classification: HARD
    source: brief Step 2 (carried from existing constraint)

  - id: C3
    text: "Existing create_agent callers (no provider, no provider_config) must keep current behavior."
    classification: HARD
    source: brief Step 2

  - id: C4
    text: "Per-provider provider_config schemas live alongside each provider in src/providers/<name>.ts. No central enum / parallel registry."
    classification: HARD
    source: brief Step 2

  - id: C5
    text: "Initial scope: Claude + Codex provider_config schemas. OpenCode accepts provider but empty provider_config. Each future provider is a one-file follow-up PR."
    classification: HARD
    source: brief Step 2 (refined after Q3)

  - id: C6
    text: "Fire-and-forget MCP semantics preserved: handler returns synchronously; validation outcomes surface via notifyAgent system message."
    classification: HARD
    source: brief Step 2 (carried from existing pattern)

  - id: C7
    text: "Supply-chain rules apply (minimumReleaseAge: 4320, frozen-lockfile in CI). No new package deps expected; any new deps require human approval."
    classification: HARD
    source: project CLAUDE.md "Supply Chain Security (pnpm)"

  - id: C8
    text: "Module is registry-based (src/modules/agent-to-agent/index.ts). New code fits that pattern; tests use vitest (host) / bun:test (container)."
    classification: SOFT
    source: brief Step 2 (codebase convention)

  - id: C9
    text: "Per-provider config persistence mechanism is design's call but must satisfy HARD persistence (every container wake reflects spawn-time config)."
    classification: SOFT
    source: brief Step 2

decisions:
  - id: D1
    question: "MCP API shape — flat params (model + reasoning_effort), just model, or nested provider_config object?"
    options_considered:
      - "(a) Flat params: { model, reasoning_effort }"
      - "(b) Just model — reasoning_effort host-wide via .env or ~/.codex/config.toml"
      - "(c) Nested provider_config object — each provider owns its schema"
    chosen: "(c) Nested provider_config object"
    rationale: |
      User correctly pointed out that flat reasoning_effort leaks Codex's vocabulary into a tool that
      should be provider-agnostic — Claude uses 'effort', OpenCode doesn't expose it at all. Flat
      params for model are fine (universal concept), but every other knob is provider-shaped, and
      flat fields would accumulate "ignored unless provider X" semantics. (c) keeps the surface
      polymorphic and lets each provider grow its own schema independently. (b) was rejected because
      it forces every Codex agent on the host to share the same reasoning_effort — defeats the point
      of mixed-provider swarms.
    asked_at: 2026-04-24

  - id: D2
    question: "Scope for this iteration — Codex only, Codex + Claude, or all three (Codex + Claude + OpenCode)?"
    options_considered:
      - "(a) Codex config only — Claude/OpenCode accept provider but no provider_config keys"
      - "(b) Codex + Claude — both schemas defined; OpenCode deferred"
      - "(c) All three providers"
    chosen: "(b) Codex + Claude"
    rationale: |
      User clarified that 'just adding codex' meant Codex as a new option alongside Claude, not
      Codex-only scope. Both providers should support per-spawn config since the user wants to spawn
      either type from chat (e.g., 'a Codex coder + a Claude reviewer'). OpenCode deferred because
      its add-skill is more complex (SDK pinning, ANTHROPIC_BASE_URL, OneCLI x-api-key quirks) and
      adding it doubles the test matrix without serving a current need. Each future provider is a
      one-file follow-up PR — the registry-per-provider design (C4) makes that cheap.
    asked_at: 2026-04-24

  - id: D3
    question: "What knobs does Claude's provider_config schema expose?"
    options_considered:
      - "model only"
      - "model + effort (Opus 4.6+ first-class SDK option)"
      - "model + effort + thinking_budget"
      - "everything in QueryInput"
    chosen: "model + effort"
    rationale: |
      Verified against container/agent-runner/src/providers/claude.ts and types.ts (QueryInput
      interface). The Claude SDK exposes 'model' and 'effort' as the per-query knobs the host
      currently honors. Other QueryInput fields (cwd, continuation, systemContext) are driven by
      session machinery, not user choice. SDK options like permissionMode and disallowedTools are
      intentionally fixed by the host as security baselines. thinking_budget is not currently wired
      and adding it is out of scope for this iteration.
    asked_at: 2026-04-24
    investigation: "Read container/agent-runner/src/providers/types.ts (QueryInput) and grep'd claude.ts for SDK option assignments."

  - id: D4
    question: "Where do provider_config schemas live and where does validation execute?"
    options_considered:
      - "(A) Host-side: schemas in src/providers/<name>.ts, validation in src/modules/agent-to-agent/create-agent.ts"
      - "(B) Container-side: schemas in container/agent-runner/src/providers/<name>.ts, validation in container/agent-runner/src/mcp-tools/agents.ts"
      - "(C) Hybrid: container-side validation; persistence path special-cases Claude into existing container.json defaultModel/defaultEffort fields, others into new providerConfig blob"
    chosen: "(B) Container-side"
    rationale: |
      Resolves the validation-surface mismatch surfaced as C11 — the host has no central registry of
      'valid provider names' (src/providers/index.ts only lists providers needing host-side mounts/env;
      Claude/mock are absent by design). The container's provider-registry.ts is the actual source of
      truth for what providers can run. Container-side validation also means: zero new host deps
      (zod@^4 already in container/agent-runner/package.json), synchronous error feedback via MCP
      isError (no fire-and-forget back-channel for the error path — C1 satisfied trivially because no
      system message is ever written for a failed validation), and a single symmetric persistence
      model (every provider's config rides on a new container.json.providerConfig blob).
      Rejected (A) — adds zod to host (subject to minimumReleaseAge gate), creates dual-registry
      drift, and pushes errors into the asynchronous notifyAgent channel ("Creating agent…" then
      separate error message — confusing).
      Rejected (C) — asymmetric persistence creates two paths to maintain. Existing defaultModel
      field has documented semantics ("for the bare opus alias") that don't cleanly cover arbitrary
      model strings; broadening the field is a separate change of intent.
      This refines brief constraint C4: schemas live with the provider runtime
      (container/agent-runner/src/providers/<name>.ts) instead of the host path the brief literally
      named. The brief's "or co-located there" leaves room; the spirit (schema with provider, no
      central enum) is preserved.
    constraint_refs: [C1, C4, C7, C11]
    asked_at: 2026-04-24
    investigation: |
      Read src/providers/index.ts, src/providers/provider-container-registry.ts,
      container/agent-runner/src/providers/index.ts, container/agent-runner/src/providers/provider-registry.ts,
      container/agent-runner/src/config.ts (RunnerConfig surface),
      src/container-config.ts (ContainerConfig schema + read/write helpers, defaultModel/defaultEffort
      semantics), src/container-runner.ts:1196-1224 (Claude env-var plumbing),
      src/modules/agent-to-agent/create-agent.ts (current handler), and grep'd for zod usage in container
      (already a dep, not yet imported anywhere).

constraints_added_in_design:
  - id: C10
    text: "container.json is mounted read-only inside the container; only the host writes it."
    classification: HARD
    source: code (src/container-config.ts:5, mount setup in container-runner.ts)

  - id: C11
    text: "Host has no central registry of 'valid provider names.' src/providers/index.ts only registers providers needing host-side mounts/env; Claude/mock are absent by design. The container's provider-registry.ts is the source of truth."
    classification: HARD
    source: code (src/providers/index.ts:1-7, container/agent-runner/src/providers/index.ts:1-6)
    material_to_decision: D4

  - id: D5
    question: "M2 from /team-review — admin-only gate (C2) described in agents.ts:8 does not exist in code. Fix in scope or waive?"
    options_considered:
      - "(a) Fix in scope — add user_roles check in handleCreateAgent (mirror command-gate.ts pattern); ~20 lines; removes the comment/code mismatch"
      - "(b) Waive — note in design that C2 is unenforced today, this PR does not fix it"
    chosen: "(b) Waive"
    rationale: |
      User explicitly elected to waive rather than fix in scope, keeping the PR focused on the provider+config
      extension. Risk accepted: qualitative attack surface ("any agent can spawn arbitrary sub-agents") is
      pre-existing, unchanged by this PR. Quantitative cost widens — a non-admin agent can now spawn agents
      that consume Codex/OpenAI/OpenRouter API budget, not just Claude tokens. User accepts this widening.
      Follow-up responsibility: file a separate issue to add the gate and update the stale comment at
      agents.ts:8. Do NOT do that in this PR.
    constraint_refs: [C2]
    asked_at: 2026-04-24
    waiver_risk_level: medium
    waiver_acknowledged_by: user
    investigation: |
      Verified during /team-review fact-check: grep confirmed mcp-tools/index.ts:11 unconditionally imports
      agents.js (no admin conditional); create-agent.ts has no canAccessAgentGroup or user_roles query.

  - id: D6
    question: "M1 from /team-review — how to prevent the split-brain where agent_groups.agent_provider is set but container.json.provider is not?"
    options_considered:
      - "(a) handleCreateAgent writes both agent_groups.agent_provider and container.json.provider in one updateContainerConfig call"
      - "(b) ensureRuntimeFields (container-runner.ts:1118) reconciles container.json.provider against resolveProviderName() on every spawn"
      - "(c) Both"
    chosen: "(a) handleCreateAgent writes both atomically"
    rationale: |
      Keeps the write at the single point where both values are known — the create-agent handler. Option (b)
      alone would work but reconciles on every spawn (many writes), and papers over the same bug upstream
      of the fix. Option (c) is belt-and-suspenders — low cost, but adds spawn-path complexity for a problem
      that only matters at creation time. (a) is the minimum-diff, minimum-semantic-change fix. A future PR
      could add (b) as a defense-in-depth check if other creation paths surface.
    constraint_refs: [C1, C3]
    asked_at: 2026-04-24
    investigation: |
      Verified that container-side index.ts:45 reads config.provider from container.json (defaults to 'claude')
      and passes it to createProvider(). ensureRuntimeFields at container-runner.ts:1118-1138 currently syncs
      agentGroupId/groupName/assistantName only — never provider.

  - id: D7
    question: "M3 from /team-review — schema is structural-only (effort: z.string().optional()). Accepts invalid values. Fix?"
    options_considered:
      - "(a) Tighten effort to z.enum(['low','medium','high','xhigh']); model stays string().min(1)"
      - "(b) Leave as string; accept that invalid values fail at first wake"
      - "(c) Full enum everywhere including model"
    chosen: "(a) Tighten effort to enum; model stays string().min(1)"
    rationale: |
      effort has a closed, known enum that matches ContainerConfig.defaultEffort at container-config.ts:125.
      Not constraining it violates HARD C1 — arbitrary effort values create persistent state then fail at first
      wake. model is open-ended (model names proliferate across provider versions); full enum is impractical
      and brittle. min(1) is the minimum viable guard on model. Also: use z.strictObject over z.object().strict()
      (Zod 4 idiom, flagged as W1 in review).
      Codex's reasoning_effort gets the same treatment with enum ['low','medium','high'].
    constraint_refs: [C1]
    asked_at: 2026-04-24

  - id: D8
    question: "S2 from /team-review — behavior when a provider is registered but exports no configSchema?"
    options_considered:
      - "(a) Silent pass — no validation when no schema"
      - "(b) Permit empty, reject non-empty (substitute z.strictObject({}))"
      - "(c) Require every provider to declare at least z.strictObject({}) — reject calls when missing"
    chosen: "(b) Permit empty, reject non-empty"
    rationale: |
      (a) defeats the point of validation; an agent could pass any shape and it would silently land in
      container.json. (c) is cleaner long-term but makes the registry contract stricter than it is today
      (existing providers like claude/mock predate this work). (b) is the pragmatic middle: uniform "empty is
      always safe" contract; non-empty provider_config requires an explicit schema, preventing silent accept.
      When new providers register, they get zero-config behavior for free and can opt in to config later by
      declaring a schema.
      Important: D8's strict fallback is safe because D11 ships the Codex configSchema in the same PR — there
      is no rollout window where a registered provider lacks its schema. See M7 / D11.
    constraint_refs: [C1, C5]
    asked_at: 2026-04-24

  - id: D9
    question: "M5 from /team-review pass 2 — effort enum missing 'max'. Fix?"
    options_considered:
      - "(a) Widen the enum to include 'max' and widen ContainerConfig.defaultEffort to match"
      - "(b) Keep 4 values and document 'max' exclusion as intentional (cost control)"
      - "(c) Leave as-is (accept the regression)"
    chosen: "(a) Widen both"
    rationale: |
      Previous revision (r1) anchored Claude's effort enum to ContainerConfig.defaultEffort (four values:
      low/medium/high/xhigh) — which itself is stale vs the SDK's EffortLevel type (sdk.d.ts:462 has five
      values including 'max'). The result: the M3 fix rejected a valid SDK input that the pre-PR code path
      silently accepted. That's a new regression violating C3 ("existing callers keep behavior").
      (b) was considered as a cost-control measure but would need a stated rationale and a user decision —
      the user has not expressed that preference and the SDK reserves 'max' for Opus 4.6/4.7 which is what
      the user is already running. Correct fix: match the SDK.
      Also widen ContainerConfig.defaultEffort at container-config.ts:125 so the existing per-group and
      per-channel defaults can use 'max' too. One-line type widening.
    constraint_refs: [C1, C3]
    asked_at: 2026-04-24
    investigation: |
      Verified EffortLevel type at container/agent-runner/node_modules/@anthropic-ai/claude-agent-sdk/sdk.d.ts:462
      ('low' | 'medium' | 'high' | 'xhigh' | 'max'). Verified ContainerConfig.defaultEffort at src/container-config.ts:125
      missing 'max' (4 values).

  - id: D10
    question: "M6 from /team-review pass 2 — D6 says 'atomic' but DB and filesystem cannot transact together. Fix?"
    options_considered:
      - "(a) Specify ordering + rollback: write container.json first, then DB insert, rollback FS on DB failure"
      - "(b) Accept the gap and document it explicitly (no rollback; orphan state possible on mid-sequence failure)"
      - "(c) Add an abstraction layer that simulates atomicity (stage directory, two-phase commit style)"
    chosen: "(a) Specify ordering + rollback"
    rationale: |
      (c) is over-engineering for a fire-and-forget creation path that is already idempotent-enough at the
      destination layer. (b) accepts real split-brain failure modes that D6 was supposed to prevent.
      (a) is the minimum-viable fix: write the immutable config first, then the DB row (the "pointer"),
      and rollback the FS on a DB failure. This makes the only failure mode "orphan config directory with
      no DB pointer" — discoverable and cleanable, not a silent wrong-provider split-brain.
      D6 wording "atomically" is misleading and must be corrected in the design; "sequenced-write-with-rollback"
      is the accurate term.
    constraint_refs: [C1, C3]
    asked_at: 2026-04-24

  - id: D11
    question: "M7 from /team-review pass 2 — D8's strictObject({}) fallback blocks legitimate Codex usage in rollout window. Fix?"
    options_considered:
      - "(a) Ship Codex configSchema as paired commit on upstream/providers in the same PR scope"
      - "(b) Soften D8 fallback to z.record(z.unknown()) (accept any shape when no schema)"
      - "(c) Release-gate the Codex schema commit and document the rollout window as a known gap"
    chosen: "(a) Ship paired commit"
    rationale: |
      (b) reintroduces silent-accept risk B warned about — defeats the point of D8.
      (c) leaves the brief's Success Criterion #1 unreachable during the gap — violates the spirit of M7
      being a blocker at all.
      (a) spans the PR across two branches (trunk + providers) which is less tidy but materially cleaner:
      one coherent change, reviewable end-to-end, no window where schema is missing. The user's workflow
      already has the /add-codex skill pulling from origin/providers; shipping the schema with the provider
      files on that branch is the natural place for it.
      A5's previous "schema ships as follow-up" framing is superseded by D11 — the schema is now part of
      this PR.
      Also addresses Reviewer C finding #3 (re-raise of M4).
    constraint_refs: [C1, C5]
    asked_at: 2026-04-24

